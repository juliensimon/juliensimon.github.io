name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-site/package-lock.json

      - name: Install dependencies
        working-directory: next-site
        run: npm ci

      - name: Build
        working-directory: next-site
        run: npm run build

      - name: Detect changed URLs for IndexNow
        id: urls
        run: |
          BASE="https://www.julien.org"
          URLS=""

          # Changed HTML files in public/ from this commit
          for f in $(git diff --name-only HEAD~1 HEAD -- 'next-site/public/' 2>/dev/null | grep '\.html$' | sed 's|next-site/public/||'); do
            URLS="${URLS}\"${BASE}/${f}\","
          done

          # Always include homepage and sitemaps
          URLS="${URLS}\"${BASE}/\",\"${BASE}/sitemap-index.xml\",\"${BASE}/sitemap-blog.xml\""

          # Deduplicate and format as JSON array
          URL_JSON=$(echo "[${URLS}]" | python3 -c "import json,sys; print(json.dumps(list(dict.fromkeys(json.load(sys.stdin)))))")
          echo "json=${URL_JSON}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: next-site/out

    outputs:
      changed_urls: ${{ steps.urls.outputs.json }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Ping IndexNow (Bing + Yandex)
        if: success()
        env:
          URL_JSON: ${{ needs.build.outputs.changed_urls }}
        run: |
          echo "Pinging IndexNow with changed URLs..."
          echo "${URL_JSON}" | python3 -c "import json,sys; [print(f'  {u}') for u in json.load(sys.stdin)]"
          curl -s -w "\nHTTP %{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"www.julien.org\",
              \"key\": \"24d30db2b0514b1780b427dde1b02d0d\",
              \"keyLocation\": \"https://www.julien.org/24d30db2b0514b1780b427dde1b02d0d.txt\",
              \"urlList\": ${URL_JSON}
            }"
