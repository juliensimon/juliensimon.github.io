name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-site/package-lock.json

      - name: Install dependencies
        working-directory: next-site
        run: npm ci

      - name: Build
        working-directory: next-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: next-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Ping IndexNow (Bing + Yandex)
        if: success()
        run: |
          curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "www.julien.org",
              "key": "24d30db2b0514b1780b427dde1b02d0d",
              "keyLocation": "https://www.julien.org/24d30db2b0514b1780b427dde1b02d0d.txt",
              "urlList": [
                "https://www.julien.org/",
                "https://www.julien.org/experience",
                "https://www.julien.org/speaking",
                "https://www.julien.org/publications",
                "https://www.julien.org/code",
                "https://www.julien.org/youtube-videos",
                "https://www.julien.org/books",
                "https://www.julien.org/computers",
                "https://www.julien.org/blog",
                "https://www.julien.org/industry-perspectives",
                "https://www.julien.org/sitemap.xml",
                "https://www.julien.org/sitemap-blog.xml",
                "https://www.julien.org/sitemap-videos.xml",
                "https://www.julien.org/sitemap-speaking.xml"
              ]
            }'
